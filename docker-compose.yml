version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: truphish-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: truphish_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      start_period: 15s

  ml-service:
    build:
      context: ./ml-service
    container_name: truphish-ml-service
    restart: always
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: truphish-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=truphish_db
      - ML_API_URL=http://ml-service:8000
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: truphish-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
